name: Update package_index.json checksums

on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  update-checksums:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update tool sizes via HEAD request (no download)
        run: |
          python3 << 'PYEOF'
          import json, subprocess

          with open("package_nxp_mcx_index.json") as f:
              pkg = json.load(f)

          for tool in pkg["packages"][0]["tools"]:
              if tool["name"] == "arm-none-eabi-gcc":
                  for sys in tool["systems"]:
                      url = sys["url"]
                      host = sys["host"]
                      print(f"HEAD {host}: {url}")
                      result = subprocess.run(
                          ["curl", "-sI", "--location", url],
                          capture_output=True, text=True
                      )
                      size = None
                      for line in result.stdout.splitlines():
                          if line.lower().startswith("content-length:"):
                              size = line.split(":", 1)[1].strip()
                      if size:
                          sys["size"] = size
                          print(f"  size: {size}")
                      else:
                          print(f"  WARNING: could not get size")

          with open("package_nxp_mcx_index.json", "w") as f:
              json.dump(pkg, f, indent=2)
          print("Done")
          PYEOF

      - name: Download platform ZIP and compute checksum
        run: |
          URL=$(python3 -c "
          import json
          with open('package_nxp_mcx_index.json') as f:
              pkg = json.load(f)
          print(pkg['packages'][0]['platforms'][0]['url'])
          ")
          echo "Platform URL: $URL"
          curl -L --silent --show-error "$URL" -o /tmp/platform.zip
          SHA256=$(sha256sum /tmp/platform.zip | awk '{print $1}')
          SIZE=$(wc -c < /tmp/platform.zip | tr -d ' ')
          echo "Platform SHA256: $SHA256"
          echo "Platform SIZE:   $SIZE"
          echo "$SHA256" > /tmp/platform_sha256.txt
          echo "$SIZE"   > /tmp/platform_size.txt
          rm /tmp/platform.zip

      - name: Update platform checksum in package_index.json
        run: |
          python3 << 'PYEOF'
          import json

          with open("package_nxp_mcx_index.json") as f:
              pkg = json.load(f)

          with open("/tmp/platform_sha256.txt") as f:
              platform_sha256 = "SHA-256:" + f.read().strip()
          with open("/tmp/platform_size.txt") as f:
              platform_size = f.read().strip()

          pkg["packages"][0]["platforms"][0]["checksum"] = platform_sha256
          pkg["packages"][0]["platforms"][0]["size"] = platform_size

          print(f"Platform checksum: {platform_sha256}")
          print(f"Platform size:     {platform_size}")

          with open("package_nxp_mcx_index.json", "w") as f:
              json.dump(pkg, f, indent=2)
          print("Done")
          PYEOF

      - name: Commit updated package_index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package_nxp_mcx_index.json
          git diff --staged --quiet || git commit -m "Update checksums in package_index.json"
          git push
